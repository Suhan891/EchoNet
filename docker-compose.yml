services:
  redis:
    image: redis:7
    container_name: social_media_redis
    ports:
      - "6379:6379"
    networks:
      - social_media_network
    volumes:
      - redis_data:/data
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: social_media_redisinsight
    networks:
      - social_media_network
    depends_on:
      - redis
    ports:
      - "5540:5540"

  postgres:
    image: postgres:15.3-alpine
    container_name: social_media_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: suhan
      POSTGRES_DB: social_media
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    networks:
      - social_media_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d social_media" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: social_media_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: suhan
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - social_media_network
    restart: unless-stopped
    depends_on:
      - postgres

  server:
    #build: ./backend
    image: suhan06/social_media_backend
    container_name: social_media_server
    networks:
      - social_media_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3000
      - PORT=3001
      - MAIL_SENDER=onboarding@suhan.co.in

  client:
    build: ./frontend
    container_name: social_media_client
    image: suhan06/social_media_frontend
    networks:
      - social_media_network
    depends_on:
      - server
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://server:3001

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local

networks:
  social_media_network:
    driver: bridge
