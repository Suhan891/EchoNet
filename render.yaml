services:
  # Frontend Web Service
  - type: web
    name: frontend-service
    runtime: image
    image:
      name: docker.io/suhan06/social_media_frontend:latest
    plan: free
    dockerPort: 3000
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: backend-service
          property: url

  # Backend Web Service
  - type: web
    name: backend-service
    runtime: image
    image:
      name: docker.io/suhan06/social_media_backend:latest
    plan: free
    dockerPort: 3000
    preDeployCommand: npx prisma migrate deploy
    envVars:
      - fromGroup: backend-secrets 

      - key: FRONTEND_URL
        fromService:
          type: web
          name: frontend-service
          property: url

      # Prisma Connection String
      - key: DATABASE_URL
        fromDatabase:
          name: my-managed-postgres
          property: connectionString

      # Corrected Redis Mappings
      - key: REDIS_HOST
        fromRedis:
          name: my-managed-redis
          property: host
      - key: REDIS_PORT
        fromRedis:
          name: my-managed-redis
          property: port

databases:
  - name: my-managed-postgres
    plan: free
    postgresMajorVersion: "16"

redis:
  - name: my-managed-redis
    plan: free

envVarGroups:
  - name: backend-secrets
